optimizer:
  type: AdamW
  part: adapt
  kwargs:
    lr: 0.00025
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 300
    initial_epochs: 10

dataset:
  train:
    _base_: cfgs/dataset_configs/ShapeNetPart.yaml
    others: { subset: "train" }
  val:
    _base_: cfgs/dataset_configs/ShapeNetPart.yaml
    others: { subset: "val" }
  test:
    _base_: cfgs/dataset_configs/ShapeNetPart.yaml
    others: { subset: "test" }

model:
  NAME: PointTransformerPartSeg_PGST
  trans_dim: 384
  depth: 12
  drop_path_rate: 0.1
  cls_dim: 50
  num_heads: 6
  group_size: 32
  num_group: 128
  encoder_dims: 256
  rank: 36
  local: 16
  use_ecfr: false  # ECFR开关: true启用特征值条件化门控, false使用原始PCSA
  NUM_PARTS: 50

npoints: 2048
total_bs: 16
max_epoch: 300
step_per_update: 1
grad_norm_clip: 10
